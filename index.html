<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link href="style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
 <body>
  <div class="container">
    <div class="card">
      <div class="loader hidden"></div>
      <h2>💱 Currency Converter</h2>

      <form>
        <div class="input-group">
          <label>Enter Amount</label>
          <input class="box" value="1" type="number" />
        </div>

        <div class="dropdown">
          <div class="from">
            <label>From</label>
            <div class="select-container">
              <img src="https://flagsapi.com/US/shiny/64.png" />
              <select name="from"></select>
            </div>
          </div>

          <button type="button" class="swap">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
          </button>

          <div class="to">
            <label>To</label>
            <div class="select-container">
              <img src="https://flagsapi.com/IN/shiny/64.png" />
              <select name="to"></select>
            </div>
          </div>
        </div>

        <div class="msg">1 USD = 80 INR</div>

        <button class="btn">Get Exchange Rate</button>
        <button type="button" id="themeToggle">🌙</button>
      </form>
    </div>
  </div>
  
</body>
<script src="codes.js"></script>
<script src="app.js"></script>
</html>
